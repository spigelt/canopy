version: '3.8'

services:
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-8080}:8080"
      - "${RPC_PORT:-50051}:50051"
    volumes:
      - canopy-data:/root/.canopy
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - canopy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  canopy-auto-update:
    build:
      context: .
      dockerfile: .docker/auto-update/Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - UPDATE_INTERVAL=${UPDATE_INTERVAL:-3600}
      - REPO_URL=${REPO_URL:-https://github.com/canopy-network/canopy}
      # tracking main branch from upstream; switch to a personal fork branch if needed
      - BRANCH=${BRANCH:-main}
    networks:
      - canopy-network
    depends_on:
      - canopy

volumes:
  canopy-data:
    driver: local

networks:
  canopy-network:
    driver: bridge
